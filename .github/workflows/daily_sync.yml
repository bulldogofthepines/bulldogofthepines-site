name: Midnight ChOmp Sync

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: 

# This gives the bot explicit permission to save files to your repo
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main # Ensures we are pushing to your live branch

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests

      - name: Create Backup Folder
        run: mkdir -p inventory_backups

      - name: Run GhoBot
        run: python ghobot_mirror.py
        env:
          EBAY_TOKEN: ${{ secrets.EBAY_TOKEN }}
          EBAY_APP_ID: ${{ secrets.EBAY_APP_ID }}
          EBAY_DEV_ID: ${{ secrets.EBAY_DEV_ID }}
          EBAY_CERT_ID: ${{ secrets.EBAY_CERT_ID }}

      - name: Commit and Push changes
        run: |
          git config --global user.name 'BoMaMeMo Bot'
          git config --global user.email 'bot@bulldogofthepines.com'
          # Add all new/updated files
          git add latest_inventory.csv inventory-mirror.html inventory_backups/
          # Commit only if there are changes; if not, don't fail
          git commit -m "Midnight Inventory ChOmp" || exit 0
          git push origin main
