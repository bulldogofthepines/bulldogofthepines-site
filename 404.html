<!DOCTYPE html>
<html>
<head>
    <title>Redirecting to Bulldog of the Pines...</title>
    <script>
        // Extracts the last part of the URL
        var itemId = window.location.pathname.split('/').filter(Boolean).pop();
    
        // STRICT CHECK: Must be a number AND exactly 12 digits long
        // (eBay IDs are currently 12 digits, but you can use >= 12 to be future-proof)
        if (itemId && /^\d{12}$/.test(itemId)) {
            // Instant redirect to the actual eBay listing
            window.location.replace("https://www.ebay.com/itm/" + itemId);
        } else {
            // Fallback: Keep them in the Bulldog yard
            // This handles typos like /386001 or /gibberish
            window.location.replace("https://www.ebay.com/str/bulldogofthepines");
        }
    </script>
</head>
<body>
    <p>Redirecting to our official eBay listing... <a href="https://bulldogofthepines.com">Click here if not redirected.</a></p>
</body>
</html>
