<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{title}} | Bulldog of the Pines</title>
    <meta name="description" content="{{description}}">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org/",
      "@type": "Product",
      "name": "{{title}}",
      "image": "{{image}}",
      "description": "{{description}}",
      "sku": "{{item_id}}",
      "brand": { "@type": "Brand", "name": "Bulldog of the Pines" },
      "offers": {
        "@type": "Offer",
        "url": "https://bulldogofthepines.com/items/{{item_id}}.html",
        "priceCurrency": "USD",
        "price": "{{price}}",
        "availability": "https://schema.org/InStock",
        "itemCondition": "{{condition_url}}"
      }
    }
    </script>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; color: #333; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: #fff; width: 90%; max-width: 500px; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        .product-image { max-width: 100%; height: auto; border-radius: 8px; margin-bottom: 20px; }
        h1 { font-size: 1.5rem; color: #021F00; margin-bottom: 15px; }
        .price { font-size: 1.8rem; font-weight: bold; color: #b12704; margin-bottom: 20px; }
        .buy-button { background-color: #021F00; color: #fff; padding: 15px 30px; text-decoration: none; font-weight: bold; border-radius: 5px; display: inline-block; }
        .footer-note { margin-top: 25px; font-size: 0.8rem; color: #777; }
    </style>
</head>
<body>
    <div class="card">
        <img src="{{image}}" alt="{{title}}" class="product-image">
        <h1>{{title}}</h1>
        <div class="price">${{price}}</div>
        <p>Condition: {{human_condition}}</p>
        <a href="{{ebay_url}}" class="buy-button">Purchase on
